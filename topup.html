
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เติมเครดิต</title>

<style>

body{
    background:#08142c;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:30px;
}

.box{
    max-width:400px;
    margin:auto;
    background:#102040;
    padding:25px;
    border-radius:15px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:95%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>💰 เติมเครดิต</h2>

<input type="text" id="username" placeholder="ชื่อผู้ใช้">

<input type="number" id="amount" placeholder="จำนวนเงิน">

<input type="file" id="slip" accept="image/*">

<button onclick="sendData()">
ส่งข้อมูล
</button>

</div>

<script>

async function sendData(){

    const file = document.getElementById("slip").files[0];

    if(!file){
        alert("กรุณาเลือกสลิป");
        return;
    }

    alert("กำลังอัปโหลดสลิป...");

    const formData = new FormData();

    formData.append("image", file);

    const upload = await fetch(
        "https://api.imgbb.com/1/upload?key=4c43acf727abfb6cf97656affb2882fc",
        {
            method:"POST",
            body:formData
        }
    );

    const result = await upload.json();

    const imageUrl = result.data.url;

    fetch(
    "https://script.google.com/macros/s/AKfycbzwjgBRgtqQx9xPno366O-lDS_b13yyKmkDoxL3qhzYdVYFV9dWVkC5UoukjRS7tR1ozA/exec",
    {

        method:"POST",

        headers:{
            "Content-Type":"text/plain;charset=utf-8"
        },

        body:JSON.stringify({

            username:document.getElementById("username").value,

            amount:document.getElementById("amount").value,

            imageUrl:imageUrl

        })

    })

    .then(response=>response.text())

    .then(data=>{

        alert("ส่งข้อมูลสำเร็จ");

    })

    .catch(error=>{

        alert(error);

    });

}

</script>

</body>
</html>
```
