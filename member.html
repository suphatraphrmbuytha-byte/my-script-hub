```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สมาชิก</title>
</head>
<body>

<script>

if(localStorage.getItem("loggedIn") != "true"){

window.location.href="index.html";

}

</script>

<h1>ยินดีต้อนรับ</h1>

<button onclick="logout()">
ออกจากระบบ
</button>

<script>

function logout(){

localStorage.removeItem("loggedIn");

window.location.href="index.html";

}

</script>

</body>
</html>
```
